apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: weknora-agent
  label:
    en_US: WeKnora Agent
    zh_Hans: WeKnora Agent
  description:
    en_US: Run a WeKnora agent or knowledge-base chat app as a LangBot AgentRunner.
    zh_Hans: 将 WeKnora 智能体或知识库问答应用作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: WeKnoraAgentPlugin
