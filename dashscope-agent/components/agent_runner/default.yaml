apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: DashScope
    zh_Hans: 百炼
  description:
    en_US: Run an Aliyun DashScope application as a LangBot AgentRunner.
    zh_Hans: 将阿里云百炼应用作为 LangBot AgentRunner 运行。
spec:
  config:
    - name: app-type
      label:
        en_US: App Type
        zh_Hans: 应用类型
      type: select
      required: true
      default: agent
      options:
        - name: agent
          label:
            en_US: Agent
            zh_Hans: Agent
        - name: workflow
          label:
            en_US: Workflow
            zh_Hans: 工作流
    - name: api-key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: string
      required: true
      default: ''
    - name: app-id
      label:
        en_US: App ID
        zh_Hans: 应用 ID
      type: string
      required: true
      default: ''
    - name: references_quote
      label:
        en_US: References Quote
        zh_Hans: 引用文本
      type: string
      required: false
      default: '参考资料来自:'
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 超时时间
      type: number
      required: false
      default: 120
    - name: langbot-assets-enabled
      label:
        en_US: Enable LangBot Assets
        zh_Hans: 启用 LangBot 资产
      type: boolean
      required: false
      default: false
    - name: langbot-assets-gateway-host
      label:
        en_US: LangBot Asset Gateway Host
        zh_Hans: LangBot 资产网关监听地址
      type: string
      required: false
      default: '0.0.0.0'
    - name: langbot-assets-gateway-port
      label:
        en_US: LangBot Asset Gateway Port
        zh_Hans: LangBot 资产网关端口
      type: integer
      required: false
      default: 8765
    - name: langbot-assets-gateway-request-timeout
      label:
        en_US: LangBot Asset Gateway Request Timeout
        zh_Hans: LangBot 资产网关请求超时
      type: integer
      required: false
      default: 60
    - name: langbot-assets-token-ttl
      label:
        en_US: LangBot Asset Token TTL
        zh_Hans: LangBot 资产令牌有效期
      type: integer
      required: false
      default: 3600
    - name: langbot-assets-input-name
      label:
        en_US: LangBot Asset Token Input Name
        zh_Hans: LangBot 资产令牌输入变量名
      type: string
      required: false
      default: 'langbot_asset_run_token'
  capabilities:
    streaming: true
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: false
    interrupt: false
  permissions:
    tools:
      - detail
      - call
    knowledge_bases:
      - retrieve
    history:
      - page
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
