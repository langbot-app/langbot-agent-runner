apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: DashScope
    zh_Hans: 百炼
  description:
    en_US: Run an Aliyun DashScope application as a LangBot AgentRunner.
    zh_Hans: 将阿里云百炼应用作为 LangBot AgentRunner 运行。
spec:
  config:
    - name: app-type
      label:
        en_US: App Type
        zh_Hans: 应用类型
      type: select
      required: true
      default: agent
      options:
        - name: agent
          label:
            en_US: Agent
            zh_Hans: Agent
        - name: workflow
          label:
            en_US: Workflow
            zh_Hans: 工作流
    - name: api-key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: string
      required: true
      default: ''
    - name: app-id
      label:
        en_US: App ID
        zh_Hans: 应用 ID
      type: string
      required: true
      default: ''
    - name: references_quote
      label:
        en_US: References Quote
        zh_Hans: 引用文本
      type: string
      required: false
      default: '参考资料来自:'
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 超时时间
      type: number
      required: false
      default: 120
  capabilities:
    streaming: true
    tool_calling: false
    knowledge_retrieval: false
    multimodal_input: false
    interrupt: false
  permissions:
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
