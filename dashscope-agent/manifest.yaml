apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: dashscope-agent
  label:
    en_US: Dashscope Agent
    zh_Hans: 百炼 Agent
  description:
    en_US: Run an Aliyun DashScope application as a LangBot AgentRunner.
    zh_Hans: 将阿里云百炼应用作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: DashScopeAgentPlugin
