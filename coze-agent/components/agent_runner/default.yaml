apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: Coze
    zh_Hans: 扣子
  description:
    en_US: Run a Coze bot as a LangBot AgentRunner.
    zh_Hans: 将扣子机器人作为 LangBot AgentRunner 运行。
spec:
  config:
    - name: api-key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: string
      required: true
      default: ''
    - name: bot-id
      label:
        en_US: Bot ID
        zh_Hans: 机器人 ID
      type: string
      required: true
      default: ''
    - name: api-base
      label:
        en_US: API Base URL
        zh_Hans: API 基础 URL
      type: select
      required: true
      default: "https://api.coze.cn"
      options:
        - name: 'https://api.coze.cn'
          label:
            en_US: Coze China
            zh_Hans: Coze 中国版
        - name: 'https://api.coze.com'
          label:
            en_US: Coze Global
            zh_Hans: Coze 全球版
    - name: auto-save-history
      label:
        en_US: Auto Save History
        zh_Hans: 自动保存历史
      type: boolean
      required: false
      default: true
    - name: timeout
      label:
        en_US: Request Timeout
        zh_Hans: 请求超时
      type: number
      required: false
      default: 120
    - name: langbot-assets-enabled
      label:
        en_US: Enable LangBot Assets
        zh_Hans: 启用 LangBot 资产
      type: boolean
      required: false
      default: false
    - name: langbot-assets-gateway-host
      label:
        en_US: LangBot Asset Gateway Host
        zh_Hans: LangBot 资产网关监听地址
      type: string
      required: false
      default: '0.0.0.0'
    - name: langbot-assets-gateway-port
      label:
        en_US: LangBot Asset Gateway Port
        zh_Hans: LangBot 资产网关端口
      type: integer
      required: false
      default: 8765
    - name: langbot-assets-gateway-request-timeout
      label:
        en_US: LangBot Asset Gateway Request Timeout
        zh_Hans: LangBot 资产网关请求超时
      type: integer
      required: false
      default: 60
    - name: langbot-assets-token-ttl
      label:
        en_US: LangBot Asset Token TTL
        zh_Hans: LangBot 资产令牌有效期
      type: integer
      required: false
      default: 3600
    - name: langbot-assets-input-name
      label:
        en_US: LangBot Asset Token Input Name
        zh_Hans: LangBot 资产令牌输入变量名
      type: string
      required: false
      default: 'langbot_asset_run_token'
  capabilities:
    streaming: true
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: true
    interrupt: false
  permissions:
    tools:
      - detail
      - call
    knowledge_bases:
      - retrieve
    history:
      - page
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
