apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: coze-agent
  label:
    en_US: Coze Agent
    zh_Hans: 扣子 Agent
  description:
    en_US: Run a Coze bot as a LangBot AgentRunner.
    zh_Hans: 将扣子机器人作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: CozeAgentPlugin
