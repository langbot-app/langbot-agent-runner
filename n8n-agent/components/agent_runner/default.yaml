apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: n8n
    zh_Hans: n8n
  description:
    en_US: Run an n8n workflow webhook as a LangBot AgentRunner.
    zh_Hans: 将 n8n 工作流 webhook 作为 LangBot AgentRunner 运行。
spec:
  config:
    - name: webhook-url
      label:
        en_US: Webhook URL
        zh_Hans: Webhook URL
      type: string
      required: true
      default: ''
    - name: auth-type
      label:
        en_US: Authentication Type
        zh_Hans: 认证类型
      type: select
      required: true
      default: 'none'
      options:
        - name: 'none'
          label:
            en_US: None
            zh_Hans: 无认证
        - name: 'basic'
          label:
            en_US: Basic Auth
            zh_Hans: 基本认证
        - name: 'jwt'
          label:
            en_US: JWT
            zh_Hans: JWT认证
        - name: 'header'
          label:
            en_US: Header Auth
            zh_Hans: 请求头认证
    - name: basic-username
      label:
        en_US: Username
        zh_Hans: 用户名
      type: string
      required: false
      default: ''
    - name: basic-password
      label:
        en_US: Password
        zh_Hans: 密码
      type: string
      required: false
      default: ''
    - name: jwt-secret
      label:
        en_US: Secret
        zh_Hans: 密钥
      type: string
      required: false
      default: ''
    - name: jwt-algorithm
      label:
        en_US: Algorithm
        zh_Hans: 算法
      type: string
      required: false
      default: 'HS256'
    - name: header-name
      label:
        en_US: Header Name
        zh_Hans: 请求头名称
      type: string
      required: false
      default: ''
    - name: header-value
      label:
        en_US: Header Value
        zh_Hans: 请求头值
      type: string
      required: false
      default: ''
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 超时时间
      type: integer
      required: false
      default: 120
    - name: output-key
      label:
        en_US: Output Key
        zh_Hans: 输出键名
      type: string
      required: false
      default: 'response'
    - name: langbot-assets-enabled
      label:
        en_US: Enable LangBot Assets
        zh_Hans: 启用 LangBot 资产
      type: boolean
      required: false
      default: false
    - name: langbot-assets-gateway-host
      label:
        en_US: LangBot Asset Gateway Host
        zh_Hans: LangBot 资产网关监听地址
      type: string
      required: false
      default: '0.0.0.0'
    - name: langbot-assets-gateway-port
      label:
        en_US: LangBot Asset Gateway Port
        zh_Hans: LangBot 资产网关端口
      type: integer
      required: false
      default: 8765
    - name: langbot-assets-gateway-request-timeout
      label:
        en_US: LangBot Asset Gateway Request Timeout
        zh_Hans: LangBot 资产网关请求超时
      type: integer
      required: false
      default: 60
    - name: langbot-assets-token-ttl
      label:
        en_US: LangBot Asset Token TTL
        zh_Hans: LangBot 资产令牌有效期
      type: integer
      required: false
      default: 3600
    - name: langbot-assets-input-name
      label:
        en_US: LangBot Asset Token Input Name
        zh_Hans: LangBot 资产令牌输入变量名
      type: string
      required: false
      default: 'langbot_asset_run_token'
  capabilities:
    streaming: true
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: false
    interrupt: false
  permissions:
    tools:
      - detail
      - call
    knowledge_bases:
      - retrieve
    history:
      - page
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
