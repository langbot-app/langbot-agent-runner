apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: n8n-agent
  label:
    en_US: N8n Agent
    zh_Hans: n8n 工作流 Agent
  description:
    en_US: Run an n8n workflow webhook as a LangBot AgentRunner.
    zh_Hans: 将 n8n 工作流 webhook 作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: N8nAgentPlugin
