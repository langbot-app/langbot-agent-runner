apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: codex-agent
  label:
    en_US: Codex Agent
    zh_Hans: Codex Agent
  description:
    en_US: Run the local Codex CLI as a LangBot AgentRunner.
    zh_Hans: 将本机 Codex CLI 作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: CodexAgentPlugin
