apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: deerflow-agent
  label:
    en_US: DeerFlow Agent
    zh_Hans: DeerFlow Agent
  description:
    en_US: Run a DeerFlow LangGraph agent as a LangBot AgentRunner.
    zh_Hans: 将 DeerFlow LangGraph 智能体作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: DeerFlowAgentPlugin
