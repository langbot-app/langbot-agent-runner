apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: Claude Code
    zh_Hans: Claude Code
  description:
    en_US: Run the local Claude Code CLI with the current input text.
    zh_Hans: 使用当前输入文本调用本机 Claude Code CLI。
spec:
  config:
    - name: execution-mode
      label:
        en_US: Execution Mode
        zh_Hans: 执行模式
      type: select
      required: false
      default: local
      options:
        - name: local
          label:
            en_US: Local
            zh_Hans: 本机
        - name: remote
          label:
            en_US: Remote Daemon
            zh_Hans: 远端 Daemon
    - name: remote-endpoint
      label:
        en_US: Remote Endpoint
        zh_Hans: 远端地址
      type: string
      required: false
      default: ''
      show_if:
        field: execution-mode
        operator: eq
        value: remote
    - name: remote-token
      label:
        en_US: Remote Token
        zh_Hans: 远端 Token
      type: password
      required: false
      default: ''
      show_if:
        field: execution-mode
        operator: eq
        value: remote
    - name: working-directory
      label:
        en_US: Working Directory
        zh_Hans: 工作目录
      type: string
      required: false
      default: ''
      show_if:
        field: execution-mode
        operator: eq
        value: local
    - name: model
      label:
        en_US: Model
        zh_Hans: 模型
      type: string
      required: false
      default: ''
    - name: dangerously-skip-permissions
      label:
        en_US: Autonomous Permission Bypass
        zh_Hans: 自主执行权限绕过
      type: boolean
      required: false
      default: false
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 超时时间
      type: integer
      required: false
      default: 300
  capabilities:
    streaming: false
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: false
    event_context: true
    platform_api: false
    interrupt: false
    stateful_session: true
  permissions:
    models: []
    tools: ["detail", "call"]
    knowledge_bases: ["list", "retrieve"]
    history: ["page"]
    storage: []
    files: []
    platform_api: []
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
