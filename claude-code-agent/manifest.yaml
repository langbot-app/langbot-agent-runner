apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: claude-code-agent
  version: 0.1.0
  label:
    en_US: Claude Code Agent
    zh_Hans: Claude Code Agent
  description:
    en_US: Run the local Claude Code CLI as a LangBot AgentRunner.
    zh_Hans: 将本机 Claude Code CLI 作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: ClaudeCodeAgentPlugin
