apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: LiteLLM Agent Platform
    zh_Hans: LiteLLM Agent Platform
  description:
    en_US: Run an agent through the LiteLLM Agent Platform unified harness interface.
    zh_Hans: 通过 LiteLLM Agent Platform 的统一 harness 接口运行智能体。
spec:
  config:
    - name: api-mode
      label:
        en_US: API Mode
        zh_Hans: API 模式
      type: select
      required: true
      default: agent-platform
      options:
        - name: agent-platform
          label:
            en_US: Agent Platform API
            zh_Hans: Agent Platform API
        - name: managed-agents-v0
          label:
            en_US: lite-harness Managed Agents V0
            zh_Hans: lite-harness Managed Agents V0
    - name: base-url
      label:
        en_US: Base URL
        zh_Hans: 基础 URL
      type: string
      required: true
      default: ''
    - name: api-key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: password
      required: false
      default: ''
    - name: agent-id
      label:
        en_US: Agent ID
        zh_Hans: Agent ID
      type: string
      required: false
      default: ''
      show_if:
        field: api-mode
        operator: eq
        value: agent-platform
    - name: harness
      label:
        en_US: Harness
        zh_Hans: Harness
      type: string
      required: false
      default: claude-code
      show_if:
        field: api-mode
        operator: eq
        value: managed-agents-v0
    - name: model
      label:
        en_US: Model
        zh_Hans: 模型
      type: string
      required: false
      default: ''
    - name: title
      label:
        en_US: Session Title
        zh_Hans: 会话标题
      type: string
      required: false
      default: ''
    - name: create-session-if-missing
      label:
        en_US: Create Session If Missing
        zh_Hans: 缺少会话时创建
      type: boolean
      required: false
      default: true
    - name: session-ready-timeout
      label:
        en_US: Session Ready Timeout
        zh_Hans: 会话就绪超时
      type: integer
      required: false
      default: 300
    - name: poll-interval
      label:
        en_US: Poll Interval
        zh_Hans: 轮询间隔
      type: integer
      required: false
      default: 2
    - name: timeout
      label:
        en_US: Request Timeout
        zh_Hans: 请求超时
      type: integer
      required: false
      default: 300
  capabilities:
    streaming: false
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: false
    interrupt: false
  permissions:
    tools:
      - detail
      - call
    knowledge_bases:
      - retrieve
    history:
      - page
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
