apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: litellm-agent-platform-agent
  version: 0.1.0
  label:
    en_US: LiteLLM Agent Platform
    zh_Hans: LiteLLM Agent Platform
  description:
    en_US: Run a LiteLLM Agent Platform or lite-harness managed agent as a LangBot AgentRunner.
    zh_Hans: 将 LiteLLM Agent Platform 或 lite-harness 托管智能体作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config:
    - name: mcp-gateway-enabled
      label:
        en_US: Enable MCP Gateway
        zh_Hans: 启用 MCP Gateway
      description:
        en_US: Start a stable HTTP MCP gateway that can be registered in LiteLLM and attached to Agent Platform agents.
        zh_Hans: 启动可注册到 LiteLLM 并绑定到 Agent Platform agent 的长期 HTTP MCP gateway。
      type: boolean
      required: false
      default: false
    - name: mcp-gateway-host
      label:
        en_US: MCP Gateway Host
        zh_Hans: MCP Gateway 监听地址
      type: string
      required: false
      default: 127.0.0.1
    - name: mcp-gateway-port
      label:
        en_US: MCP Gateway Port
        zh_Hans: MCP Gateway 端口
      type: integer
      required: false
      default: 8765
    - name: mcp-gateway-public-url
      label:
        en_US: MCP Gateway Public URL
        zh_Hans: MCP Gateway 外部 URL
      description:
        en_US: URL that LiteLLM/Agent Platform can reach, for example https://langbot.example.com/mcp.
        zh_Hans: LiteLLM/Agent Platform 可访问的 URL，例如 https://langbot.example.com/mcp。
      type: string
      required: false
      default: ''
    - name: mcp-gateway-token
      label:
        en_US: MCP Gateway Token
        zh_Hans: MCP Gateway Token
      description:
        en_US: Required when the gateway is enabled. Send as Authorization Bearer token or X-LangBot-MCP-Gateway-Token.
        zh_Hans: 启用 gateway 时必填。通过 Authorization Bearer 或 X-LangBot-MCP-Gateway-Token 发送。
      type: password
      required: false
      default: ''
    - name: mcp-gateway-timeout
      label:
        en_US: MCP Gateway Timeout
        zh_Hans: MCP Gateway 超时
      type: integer
      required: false
      default: 60
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: LiteLLMAgentPlatformPlugin
