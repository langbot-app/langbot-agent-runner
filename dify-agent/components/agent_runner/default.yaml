apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: Dify
    zh_Hans: Dify
  description:
    en_US: Run a Dify application as a LangBot AgentRunner.
    zh_Hans: 将 Dify 应用作为 LangBot AgentRunner 运行。
spec:
  config:
    - name: base-url
      label:
        en_US: Base URL
        zh_Hans: 基础 URL
      type: string
      required: true
      default: 'https://api.dify.ai/v1'
    - name: base-prompt
      label:
        en_US: Base PROMPT
        zh_Hans: 基础提示词
      type: string
      required: true
      default: "When the file content is readable, please read the content of this file. When the file is an image, describe the content of this image."
    - name: app-type
      label:
        en_US: App Type
        zh_Hans: 应用类型
      type: select
      required: true
      default: chat
      options:
        - name: chat
          label:
            en_US: Chat
            zh_Hans: 聊天（包括Chatflow）
        - name: agent
          label:
            en_US: Agent
            zh_Hans: Agent
        - name: workflow
          label:
            en_US: Workflow
            zh_Hans: 工作流
    - name: api-key
      label:
        en_US: API Key
        zh_Hans: API 密钥
      type: string
      required: true
      default: ''
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 超时时间
      type: integer
      required: false
      default: 30
  capabilities:
    streaming: true
    tool_calling: false
    knowledge_retrieval: false
    multimodal_input: true
    interrupt: false
  permissions:
    storage:
      - plugin
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
