apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: dify-agent
  label:
    en_US: Dify Agent
    zh_Hans: Dify Agent
  description:
    en_US: Run a Dify application as a LangBot AgentRunner.
    zh_Hans: 将 Dify 应用作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: DifyAgentPlugin
