apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: langflow-agent
  label:
    en_US: Langflow Agent
    zh_Hans: Langflow Agent
  description:
    en_US: Run a Langflow flow as a LangBot AgentRunner.
    zh_Hans: 将 Langflow 流程作为 LangBot AgentRunner 运行。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: LangflowAgentPlugin
